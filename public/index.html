<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-do list</title>
  <link rel="icon" href="/images/todo-icon.ico" type="image/x-icon" />  
  <link rel="icon" href="/images/todo-icon.png" type="image/x-icon" /> <!-- Backup -->
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>
<header>
  <div id="title-container">
    <h1>
      Things to do:
    </h1>
  </div>
</header>
<main>
  <ul id="item-list">
    <li id="add-item">
      <input type="text" placeholder="New Item" maxlength="100" tabindex="1" aria-label="write your new item here"/>
      <button type="submit" tabindex="2" aria-label="submit new item">+</button>
    </li>
  </ul>
</main>
<script src="/js/script.js" ></script>
<footer>
  <a href="https://callummscott.github.io">GitHub</a>
</footer>
</body>
</html>
